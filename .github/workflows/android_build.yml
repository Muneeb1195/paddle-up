name: Build & Release Android

on:
  push:
    tags:
      - 'v*'

env:
  GODOT_VERSION: "4.7"
  EXPORT_NAME: PaddleUp

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Get version from tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 godot
          chmod +x godot

      - name: Download Export Templates
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip "Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -d templates_tmp
          ls -la templates_tmp/
          ls -la templates_tmp/templates/ 2>/dev/null || echo "No templates/ subdir"
          mv templates_tmp/templates/* "$TEMPLATES_DIR/" 2>/dev/null || mv templates_tmp/* "$TEMPLATES_DIR/"
          ls -la "$TEMPLATES_DIR/"

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Import Project
        run: ./godot --headless --import

      - name: Inject Keystore Config
        run: |
          sed -i 's|keystore/release=""|keystore/release="release.keystore"|' export_presets.cfg
          sed -i 's|keystore/release_user=""|keystore/release_user="${{ secrets.KEYSTORE_ALIAS }}"|' export_presets.cfg
          sed -i 's|keystore/release_password=""|keystore/release_password="${{ secrets.KEYSTORE_PASSWORD }}"|' export_presets.cfg

      - name: Build Universal APK
        run: |
          mkdir -p builds
          ./godot --headless --install-android-build-template --export-release "Android" "builds/${EXPORT_NAME}-${{ steps.tag.outputs.VERSION }}-universal.apk"

      - name: Cleanup Keystore
        if: always()
        run: rm -f release.keystore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.VERSION }}
          name: ${{ steps.tag.outputs.VERSION }}
          generate_release_notes: true
          files: builds/*.apk
